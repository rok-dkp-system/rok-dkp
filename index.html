<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROK DKP 랭킹 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
    <style>
        :root { 
            /* 가독성을 고려한 차분한 색상으로 변경 */
            --primary-color: #ffaa55; /* 부드러운 오렌지-Gold */
            --highlight-color: #ff6677; /* 차분한 핑크-레드 */
            --text-color: #d0d0d0; /* 차분한 연회색 */
            
            --bg-color: #0c0e11; /* 더 깊은 다크 배경 */
            --card-bg: #16191f; /* 차분한 카드 배경 */
            --header-bg: #1f2329; /* 헤더 전용 배경 */
            --border-color: #2e353f; /* 차분한 테두리 */
            
            --progress-bg: #2e353f; /* 차분한 바 배경 */
            --progress-fill: #ffaa55; /* 부드러운 바 채우기 색 */
        }
        body { 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h2 { 
            color: #d0d0d0; /* 제목은 흰색 톤으로 변경하여 눈 아픔 감소 */
            margin-bottom: 30px; 
            font-size: 26px;
        }

        /* 검색창 스타일 가독성 개선 */
        .search-container {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }
        #searchInput {
            flex: 1;
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: white;
            font-size: 17px;
        }
        #searchInput:focus { outline: 2px solid var(--primary-color); }

        /* 테이블 스타일 전면 개편 */
        table { 
            width: 100%; 
            max-width: 1100px; 
            border-collapse: collapse; 
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
        }
        th { 
            background-color: var(--header-bg); 
            color: #909090; /* 헤더 텍스트 색상을 차분한 회색으로 변경 */
            padding: 22px 18px; 
            font-size: 15px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color); /* 주황색 두꺼운 테두리 삭제 */
            letter-spacing: 0.5px;
        }
        td { 
            padding: 20px; 
            border-bottom: 1px solid var(--border-color); 
            text-align: center; 
            font-size: 15px; 
        }
        tr:last-child td { border-bottom: none; } /* 마지막 행 테두리 삭제 */
        tr:hover { background-color: rgba(255,255,255,0.03); } /* 호버 효과 부드럽게 */
        
        /* 프로그레스 바 스타일 차분하게 */
        .progress-container {
            width: 130px;
            background-color: var(--progress-bg);
            border-radius: 15px;
            margin: 0 auto;
            position: relative;
            height: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .progress-bar {
            height: 100%;
            background-color: var(--progress-fill);
            width: 0%;
            transition: width 0.7s ease-out; /* 부드러운 애니메이션 */
            border-radius: 15px;
        }
        .progress-text {
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            font-size: 12px;
            line-height: 20px;
            color: #121212; /* 텍스트는 어둡게 하여 바 색상과 대비 향상 */
            font-weight: bold;
        }

        /* 주요 포인트 텍스트 색상 변경 */
        .rank-gold { color: #f1c40f; font-weight: bold; } /* 부드러운 Gold */
        .rank-silver { color: #95a5a6; font-weight: bold; } /* 차분한 Silver */
        .rank-bronze { color: #c08050; font-weight: bold; } /* 차분한 Bronze */
        
        .dkp-highlight { color: var(--highlight-color); font-weight: 700; font-size: 16px; } /* 포인트 색상 완화 */
        .loading { margin-top: 60px; color: #606060; font-size: 18px; }
        
        /* 유저명과 ID 색상 완화 */
        .user-name-col { font-weight: 700; color: #e0e0e0; font-size: 16px; } 
        .user-id-col { color: #606060; font-size: 13px; } 
    </style>
</head>
<body>

    <h2>🛡️ 연맹 DKP 랭킹 보드</h2>

    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="filterData()" placeholder="유저명 또는 User ID를 입력하세요...">
    </div>
    
    <table id="dkpTable">
        <thead>
            <tr>
                <th style="width: 70px;">순위</th>
                <th>유저명</th>
                <th style="width: 120px;">ID</th>
                <th style="width: 160px;">목표 달성률</th>
                <th>T4 킬</th>
                <th>T5 킬</th>
                <th>데스</th>
                <th>총 DKP</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div id="loader" class="loading">
        🔄 데이터를 로딩 중... 잠시만 기다려주세요.
    </div>

  <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRd8sijeP2d8lwtLT9vbkVZN3ZwZ31saToMee7VGPjnNn5D_hefOr0yEKsNCc5886ntTXrI8-3Jmb6F/pub?gid=0&single=true&output=csv';
        let allData = [];

        // ⭐ 설정값: 필요에 따라 아래 숫자들을 수정하세요!
        const goalMultiplier = 2; // 목표 = 전력 * n배
        const t4Weight = 1;       // T4 킬 가중치
        const t5Weight = 4;       // T5 킬 가중치
        const deadWeight = 10;    // 데스 가중치

        function formatNumber(num) {
            return Number(num || 0).toLocaleString();
        }

        function loadData() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allData = results.data.map(row => {
                        const currentPower = parseFloat(row['전력'] || 0);
                        const t4 = parseFloat(row['T4'] || 0);
                        const t5 = parseFloat(row['T5'] || 0);
                        const dead = parseFloat(row['데스'] || 0);
                        
                        // 1. 총 DKP 계산 (계산식 적용)
                        const calculatedDkp = (t4 * t4Weight) + (t5 * t5Weight) + (dead * deadWeight);
                        
                        // 2. 목표 설정 (전력 * n배)
                        const calculatedGoal = currentPower * goalMultiplier;

                        return {
                            name: row['이름'] || '',
                            id: row['ID'] || '',
                            power: currentPower,
                            kp: calculatedDkp, // 계산된 DKP를 포인트로 사용
                            t4: t4,
                            t5: t5,
                            dead: dead,
                            goal: calculatedGoal > 0 ? calculatedGoal : 1
                        };
                    }).filter(item => item.name !== ""); 

                    // 총 DKP 기준 내림차순 정렬
                    allData.sort((a, b) => b.kp - a.kp);

                    if (allData.length > 0) {
                        displayData(allData);
                        document.querySelector('#loader').style.display = 'none';
                    } else {
                        document.querySelector('#loader').innerText = "⚠️ 데이터를 불러왔으나 표시할 내용이 없습니다.";
                    }
                }
            });
        }

        function displayData(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach((item, index) => {
                const actualRank = index + 1;
                let rankClass = '';
                if (actualRank === 1) rankClass = 'rank-gold';
                else if (actualRank === 2) rankClass = 'rank-silver';
                else if (actualRank === 3) rankClass = 'rank-bronze';

                let percentVal = (item.kp / item.goal * 100);
                let displayPercent = Math.min(percentVal, 100);
                let percentText = isFinite(percentVal) ? percentVal.toFixed(1) + "%" : "0%";

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="${rankClass}">${actualRank}</td>
                    <td class="user-name-col">${item.name}</td>
                    <td class="user-id-col">${item.id}</td>
                    <td>
                        <div class="progress-container" title="목표 DKP: ${formatNumber(item.goal)}">
                            <div class="progress-bar" style="width: ${displayPercent}%"></div>
                            <div class="progress-text">${percentText}</div>
                        </div>
                    </td>
                    <td>${formatNumber(item.t4)}</td>
                    <td>${formatNumber(item.t5)}</td>
                    <td>${formatNumber(item.dead)}</td>
                    <td class="dkp-highlight">${formatNumber(item.kp)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(item => 
                (item.id && item.id.toString().toLowerCase().includes(searchTerm)) || 
                (item.name && item.name.toLowerCase().includes(searchTerm))
            );
            displayData(filtered);
        }

        window.onload = loadData;
    </script>
    
</body>
</html>
